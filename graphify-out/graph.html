<!DOCTYPE html>
<html>
<head>
    <title>Calibre PERC Catalog - Knowledge Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #1a1a2e; }
        svg { width: 100vw; height: 100vh; }
        .node { cursor: pointer; }
        .node circle { stroke: #fff; stroke-width: 2px; }
        .node text { fill: #fff; font-size: 12px; }
        .link { stroke-opacity: 0.6; }
        .link-label { fill: #888; font-size: 10px; }
        .legend { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; }
        .legend h3 { color: #fff; margin-top: 0; }
        .legend-item { color: #fff; margin: 5px 0; }
        .legend-color { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="legend">
        <h3>Node Types</h3>
        <div class="legend-item"><span class="legend-color" style="background: #4CAF50;"></span>Main Concept</div>
        <div class="legend-item"><span class="legend-color" style="background: #2196F3;"></span>ERC Related</div>
        <div class="legend-item"><span class="legend-color" style="background: #FF9800;"></span>ESD Related</div>
        <div class="legend-item"><span class="legend-color" style="background: #9C27B0;"></span>Device</div>
    </div>
    <svg id="graph"></svg>
    <script>
        const data = {"nodes": [{"id": "calibre_perc", "label": "Calibre PERC", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "erc", "label": "Electrical Rule Check (ERC)", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "esd", "label": "ESD Protection", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "advanced_erc", "label": "Advanced ERC", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "mosfet", "label": "MOSFET", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "floating_gate", "label": "Floating Gate", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "level_shifter", "label": "Level Shifter", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "power_domain", "label": "Power Domain", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "bipolar_protection", "label": "Bipolar Protection", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "diode_protection", "label": "Diode Protection", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "input_pad", "label": "Input Pad Protection", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "power_supply_pad", "label": "Power Supply Pad", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "io_pad", "label": "I/O Pad Protection", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "capacitor", "label": "Capacitor Protection", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "bulk_connection", "label": "Bulk Connection", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "gate_ground_nmos", "label": "Gate-Ground NMOS", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "cell_tie_off", "label": "Cell Tie-off", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "back_to_back_diodes", "label": "Back-to-Back Diodes", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "big_buffer", "label": "Big Buffers", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "stacked_nfet", "label": "Stacked NFETs", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "low_voltage_mos", "label": "Low Voltage MOS", "file_type": "paper", "source_file": "Calibre_PERC_Catalog.pdf"}], "edges": [{"source": "calibre_perc", "target": "erc", "relation": "implements", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "calibre_perc", "target": "esd", "relation": "implements", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "erc", "target": "advanced_erc", "relation": "includes", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "advanced_erc", "target": "floating_gate", "relation": "checks", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "advanced_erc", "target": "bulk_connection", "relation": "checks", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "advanced_erc", "target": "level_shifter", "relation": "checks", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "advanced_erc", "target": "power_domain", "relation": "analyzes", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "advanced_erc", "target": "bipolar_protection", "relation": "checks", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "esd", "target": "input_pad", "relation": "protects", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "esd", "target": "power_supply_pad", "relation": "protects", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "esd", "target": "io_pad", "relation": "protects", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "esd", "target": "diode_protection", "relation": "uses", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "mosfet", "target": "floating_gate", "relation": "has_component", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "mosfet", "target": "bulk_connection", "relation": "requires", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "level_shifter", "target": "power_domain", "relation": "connects", "confidence": "INFERRED", "confidence_score": 0.8, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "gate_ground_nmos", "target": "esd", "relation": "implements", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "back_to_back_diodes", "target": "esd", "relation": "implements", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "stacked_nfet", "target": "esd", "relation": "implements", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "big_buffer", "target": "esd", "relation": "requires", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"source": "low_voltage_mos", "target": "esd", "relation": "requires", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}], "hyperedges": [{"id": "advanced_erc_checks", "label": "Advanced ERC Check Suite", "nodes": ["floating_gate", "bulk_connection", "level_shifter", "power_domain", "bipolar_protection", "cell_tie_off", "capacitor"], "relation": "form", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}, {"id": "esd_protection_suite", "label": "ESD Protection Suite", "nodes": ["input_pad", "power_supply_pad", "io_pad", "diode_protection", "gate_ground_nmos", "back_to_back_diodes", "stacked_nfet", "big_buffer", "low_voltage_mos"], "relation": "form", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "Calibre_PERC_Catalog.pdf"}], "input_tokens": 0, "output_tokens": 0};
        
        // Color mapping
        const colors = {
            "calibre_perc": "#4CAF50",
            "erc": "#2196F3",
            "esd": "#FF9800",
            "advanced_erc": "#2196F3",
            "mosfet": "#9C27B0"
        };
        
        function getColor(id) {
            if (id.includes("esd") || id.includes("pad") || id.includes("diode") || id.includes("nfet") || id.includes("buffer") || id.includes("voltage")) return "#FF9800";
            if (id.includes("erc") || id.includes("gate") || id.includes("bulk") || id.includes("level") || id.includes("power") || id.includes("bipolar") || id.includes("cell") || id.includes("capacitor")) return "#2196F3";
            if (id.includes("mosfet")) return "#9C27B0";
            return "#4CAF50";
        }
        
        const svg = d3.select("svg");
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        const simulation = d3.forceSimulation(data.nodes)
            .force("link", d3.forceLink(data.edges).id(d => d.id).distance(150))
            .force("charge", d3.forceManyBody().strength(-400))
            .force("center", d3.forceCenter(width/2, height/2));
        
        const link = svg.append("g")
            .selectAll("line")
            .data(data.edges)
            .enter().append("line")
            .attr("stroke", "#666")
            .attr("stroke-width", 2);
        
        const node = svg.append("g")
            .selectAll("g")
            .data(data.nodes)
            .enter().append("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));
        
        node.append("circle")
            .attr("r", 20)
            .attr("fill", d => getColor(d.id));
        
        node.append("text")
            .attr("dy", 35)
            .attr("text-anchor", "middle")
            .text(d => d.label.length > 20 ? d.label.substring(0, 20) + "..." : d.label);
        
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);
            
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });
        
        function dragstarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fy = event.subject.y;
        }
        
        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }
        
        function dragended(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }
    </script>
</body>
</html>
